    - name: Restore dependencies
      run: |
        dotnet restore CalculatorApp/CalculatorApp.csproj
        dotnet restore CalculatorApp.Tests/CalculatorApp.Tests.csproj

    - name: Build
      run: |
        dotnet build CalculatorApp/CalculatorApp.csproj --no-restore
        dotnet build CalculatorApp.Tests/CalculatorApp.Tests.csproj --no-restore

    - name: Test
      run: dotnet test CalculatorApp.Tests/CalculatorApp.Tests.csproj --no-build --verbosity normal
