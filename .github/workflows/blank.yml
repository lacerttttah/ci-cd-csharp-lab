name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore
      working-directory: CalculatorApp

    - name: Build
      run: dotnet build --no-restore
      working-directory: CalculatorApp

    - name: Test
      run: dotnet test
      working-directory: CalculatorApp
